name: Deploy to web-pc.wuaze.com

# Run manually or on push to the main branch
on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy via FTP
    runs-on: ubuntu-latest

    steps:
      # Step 1: Clone the latest code from GitHub
      - name: Get latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Upload code via FTP
      - name: Deploy to InfinityFree via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ftpupload.net
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /htdocs/  # For addon domains
          timeout: 86400000
          log-level: standard
          exclude: |
            - node_modules/
            - vendor/
            - storage/logs/
            - .git
            - .env.local
            - tests/
